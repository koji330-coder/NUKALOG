<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ぬかろぐ</title>
<style>
  :root {
    --bg: #F5F0E8;
    --surface: #FDFAF4;
    --surface2: #EDE8DC;
    --border: #E0D8C8;
    --green-dark: #3D5A3E;
    --green-mid: #6B8F5E;
    --green-light: #A8C5A0;
    --green-pale: #E8F0E6;
    --orange: #E8A87C;
    --orange-pale: #FFF0E4;
    --red-soft: #C17D6A;
    --text: #2D2A24;
    --text-mid: #5A5550;
    --text-soft: #7A7060;
    --text-faint: #9A9080;
    --user-koji: #5B82C0;
    --user-hiromi: #C17D6A;
    --nav-bg: #2D3D2E;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: var(--text);
  }
  #app {
    width: 100%;
    max-width: 420px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ヘッダー */
  #header {
    background: var(--green-dark);
    padding: 14px 18px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  #header .logo-sub { font-size: 10px; color: var(--green-light); letter-spacing: 2px; margin-bottom: 2px; }
  #header .logo-main { font-size: 20px; font-weight: 800; color: var(--bg); letter-spacing: -0.5px; }
  #user-toggle {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 6px 14px;
    cursor: pointer;
    transition: background 0.2s;
  }
  #user-toggle:active { background: rgba(255,255,255,0.2); }
  #user-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--user-koji); }
  #user-name { font-size: 13px; font-weight: 700; color: #fff; }

  /* コンテンツ */
  #content { flex: 1; padding: 16px 16px 90px; overflow-y: auto; }

  /* AIメッセージカード */
  #ai-card {
    background: linear-gradient(135deg, #2D3D2E 0%, #3D5A3E 100%);
    border-radius: 18px;
    padding: 16px 18px;
    margin-bottom: 18px;
    position: relative;
    overflow: hidden;
    display: none;
  }
  #ai-card::before {
    content: '';
    position: absolute; top: -20px; right: -20px;
    width: 80px; height: 80px;
    background: rgba(168,197,160,0.15);
    border-radius: 50%;
  }
  #ai-card .ai-label { font-size: 10px; color: var(--green-light); letter-spacing: 1.5px; font-weight: 700; margin-bottom: 6px; }
  #ai-card .ai-text { font-size: 13px; color: #e8f0e6; line-height: 1.7; }
  #ai-card .ai-date { font-size: 10px; color: rgba(168,197,160,0.6); margin-top: 8px; text-align: right; }

  /* セクションラベル */
  .section-label {
    font-size: 11px; color: var(--text-soft);
    letter-spacing: 1px; font-weight: 700;
    margin-bottom: 10px;
  }

  /* 漬け込みアイテムカード */
  .item-card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 13px 15px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 13px;
    transition: border-color 0.2s;
  }
  .item-card.urgent {
    background: var(--orange-pale);
    border-color: var(--orange);
  }
  .item-card .veg-emoji { font-size: 30px; line-height: 1; flex-shrink: 0; }
  .item-card .item-info { flex: 1; min-width: 0; }
  .item-card .item-name { font-size: 15px; font-weight: 700; color: var(--text); }
  .item-card .item-meta { display: flex; align-items: center; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
  .badge-time {
    font-size: 11px; font-weight: 700;
    padding: 3px 10px; border-radius: 10px;
    background: var(--green-pale); color: var(--green-dark);
  }
  .badge-time.urgent { background: #FFE0C8; color: #B05020; }
  .badge-user {
    font-size: 10px; font-weight: 700;
    padding: 3px 8px; border-radius: 10px;
  }
  .badge-user.koji { background: rgba(91,130,192,0.15); color: var(--user-koji); }
  .badge-user.hiromi { background: rgba(193,125,106,0.15); color: var(--user-hiromi); }
  .btn-remove {
    background: var(--surface2); border: none;
    border-radius: 12px; padding: 9px 13px;
    cursor: pointer; font-size: 12px; font-weight: 700;
    color: var(--text-mid); white-space: nowrap;
    transition: all 0.15s; flex-shrink: 0;
  }
  .btn-remove.urgent { background: var(--orange); color: #fff; }
  .btn-remove:active { transform: scale(0.95); }

  /* 空状態 */
  #empty-state {
    background: var(--surface2);
    border-radius: 16px;
    padding: 32px 20px;
    text-align: center;
    color: var(--text-faint);
    font-size: 14px;
    display: none;
  }
  #empty-state .empty-emoji { font-size: 36px; display: block; margin-bottom: 8px; }

  /* 漬け込みパネル */
  #add-btn {
    width: 100%; background: var(--green-dark); color: var(--bg);
    border: none; border-radius: 16px; padding: 16px;
    font-size: 15px; font-weight: 800; cursor: pointer;
    margin-top: 6px; letter-spacing: 0.5px;
    box-shadow: 0 4px 16px rgba(61,90,62,0.3);
    transition: all 0.15s;
  }
  #add-btn:active { transform: scale(0.98); box-shadow: 0 2px 8px rgba(61,90,62,0.2); }
  #add-panel {
    background: var(--surface); border: 2px solid var(--border);
    border-radius: 20px; padding: 18px; margin-top: 8px;
    display: none;
  }
  #add-panel .panel-title { font-size: 13px; font-weight: 700; color: var(--text-mid); margin-bottom: 14px; }
  .veg-category { margin-bottom: 14px; }
  .veg-category .cat-label {
    font-size: 10px; color: var(--text-faint);
    letter-spacing: 1px; font-weight: 700; margin-bottom: 8px;
  }
  .veg-grid { display: flex; flex-wrap: wrap; gap: 7px; }
  .veg-btn {
    background: var(--surface2); border: none;
    border-radius: 13px; padding: 9px 11px;
    cursor: pointer; text-align: center;
    transition: all 0.15s; min-width: 52px;
  }
  .veg-btn .v-emoji { font-size: 22px; line-height: 1; display: block; }
  .veg-btn .v-name { font-size: 9px; color: var(--text-soft); margin-top: 3px; display: block; }
  .veg-btn.selected {
    background: var(--green-dark);
    transform: scale(1.1);
    box-shadow: 0 4px 12px rgba(61,90,62,0.35);
  }
  .veg-btn.selected .v-name { color: var(--green-light); }
  #selected-info {
    background: var(--green-pale); border-radius: 12px;
    padding: 10px 14px; margin-top: 4px;
    font-size: 13px; color: var(--green-dark); font-weight: 600;
    display: none;
  }
  .panel-btns { display: flex; gap: 10px; margin-top: 16px; }
  .btn-cancel {
    flex: 1; background: var(--surface2); border: none;
    border-radius: 12px; padding: 12px;
    cursor: pointer; font-size: 14px; color: var(--text-soft); font-weight: 700;
    transition: background 0.15s;
  }
  .btn-cancel:active { background: var(--border); }
  .btn-confirm {
    flex: 2; background: var(--green-dark); border: none;
    border-radius: 12px; padding: 12px;
    cursor: pointer; font-size: 14px; color: #fff; font-weight: 800;
    transition: all 0.15s;
  }
  .btn-confirm:disabled { background: var(--border); cursor: not-allowed; }
  .btn-confirm:not(:disabled):active { transform: scale(0.97); }

  /* フィードバック画面 */
  #feedback-screen { display: none; text-align: center; padding-top: 24px; }
  #feedback-screen .fb-emoji { font-size: 68px; margin-bottom: 12px; }
  #feedback-screen .fb-title { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
  #feedback-screen .fb-sub { font-size: 13px; color: var(--text-soft); margin-bottom: 28px; }
  .fb-btn {
    display: block; width: 100%; border: none; border-radius: 14px;
    padding: 16px; font-size: 15px; font-weight: 800;
    cursor: pointer; margin-bottom: 10px; color: #fff;
    transition: all 0.15s;
  }
  .fb-btn:active { transform: scale(0.97); }
  .fb-btn.perfect { background: var(--green-dark); box-shadow: 0 4px 16px rgba(61,90,62,0.3); }
  .fb-btn.light { background: var(--green-mid); }
  .fb-btn.heavy { background: var(--red-soft); }

  /* レコメンド画面 */
  #recommend-screen { display: none; padding-top: 4px; }
  #recommend-screen .rec-title { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 18px; }
  .rec-card {
    background: var(--surface); border: 2px solid var(--border);
    border-radius: 16px; padding: 14px 16px;
    margin-bottom: 10px; display: flex;
    align-items: center; gap: 14px; cursor: pointer;
    transition: border-color 0.15s;
  }
  .rec-card:hover { border-color: var(--green-mid); }
  .rec-card:active { transform: scale(0.98); }
  .rec-card .rc-emoji { font-size: 36px; flex-shrink: 0; }
  .rec-card .rc-info { flex: 1; }
  .rec-card .rc-name { font-size: 15px; font-weight: 700; color: var(--text); }
  .rec-card .rc-reason { font-size: 12px; color: var(--text-soft); margin-top: 2px; }
  .rec-tag {
    font-size: 10px; font-weight: 700;
    padding: 4px 10px; border-radius: 10px; flex-shrink: 0;
  }
  .rec-tag.season { background: var(--green-pale); color: var(--green-dark); }
  .rec-tag.unique { background: #F0ECF8; color: #7A5A9E; }
  .rec-tag.twist { background: #F5E8E4; color: var(--red-soft); }
  .btn-back {
    width: 100%; background: var(--green-dark); color: var(--bg);
    border: none; border-radius: 14px; padding: 14px;
    font-size: 14px; font-weight: 800; cursor: pointer;
    margin-top: 6px; transition: all 0.15s;
  }
  .btn-back:active { transform: scale(0.98); }

  /* 履歴画面 */
  #history-screen { display: none; padding-top: 4px; }
  #history-list { background: var(--surface); border-radius: 16px; border: 2px solid var(--border); overflow: hidden; }
  .hist-item {
    padding: 12px 16px; display: flex; align-items: center;
    gap: 12px; border-bottom: 1px solid var(--surface2);
  }
  .hist-item:last-child { border-bottom: none; }
  .hist-emoji { font-size: 24px; flex-shrink: 0; }
  .hist-info { flex: 1; }
  .hist-name { font-size: 14px; font-weight: 700; color: var(--text); }
  .hist-meta { font-size: 11px; color: var(--text-faint); margin-top: 2px; }
  .hist-fb { font-size: 20px; flex-shrink: 0; }
  #history-empty { text-align: center; padding: 32px; color: var(--text-faint); font-size: 14px; display: none; }

  /* ローディング */
  .loading-spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff; border-radius: 50%;
    animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px;
  }

  /* トースト */
  #toast {
    position: fixed; top: 72px; left: 50%;
    transform: translateX(-50%) translateY(-10px);
    background: var(--green-dark); color: #fff;
    padding: 10px 24px; border-radius: 24px;
    font-size: 14px; font-weight: 700;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    z-index: 200; opacity: 0;
    transition: all 0.3s ease;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* エラー */
  #error-bar {
    background: #FDECEA; border: 1px solid #F5C6C0;
    border-radius: 12px; padding: 10px 14px;
    font-size: 12px; color: #B04040; margin-bottom: 12px;
    display: none;
  }

  /* ボトムナビ */
  #bottom-nav {
    position: fixed; bottom: 0;
    width: 100%; max-width: 420px;
    background: var(--nav-bg);
    display: flex;
    border-top: 1px solid #3D5A3E;
    z-index: 100;
  }
  .nav-btn {
    flex: 1; background: none; border: none;
    padding: 12px 8px 10px; cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; gap: 3px;
    position: relative; transition: opacity 0.15s;
  }
  .nav-btn:active { opacity: 0.7; }
  .nav-emoji { font-size: 22px; line-height: 1; }
  .nav-label {
    font-size: 10px; color: #6A7A6B;
    letter-spacing: 0.5px; font-weight: 600;
  }
  .nav-btn.active .nav-label { color: var(--green-light); }
  .nav-active-bar {
    position: absolute; bottom: 0;
    width: 24px; height: 2px;
    background: var(--green-mid); border-radius: 1px;
    display: none;
  }
  .nav-btn.active .nav-active-bar { display: block; }
  .nav-badge {
    position: absolute; top: 6px; right: calc(50% - 20px);
    background: var(--orange); color: #fff;
    font-size: 9px; font-weight: 800;
    width: 16px; height: 16px; border-radius: 50%;
    display: none; align-items: center; justify-content: center;
  }
  .nav-badge.show { display: flex; }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div>
      <div class="logo-sub">NUKALOG</div>
      <div class="logo-main">🪣 ぬかろぐ</div>
    </div>
    <div id="user-toggle">
      <div id="user-dot"></div>
      <span id="user-name">こうじ</span>
    </div>
  </div>

  <div id="content">
    <div id="error-bar"></div>

    <!-- AIカード -->
    <div id="ai-card">
      <div class="ai-label">🤖 ぬか床より</div>
      <div class="ai-text" id="ai-text"></div>
      <div class="ai-date" id="ai-date"></div>
    </div>

    <!-- ホーム画面 -->
    <div id="home-screen">
      <div class="section-label" id="items-label">糠床の中身</div>
      <div id="items-list"></div>
      <div id="empty-state"><span class="empty-emoji">🥒</span>何も漬かっていません</div>
      <button id="add-btn">＋ 漬け込む</button>
      <div id="add-panel">
        <div class="panel-title">何を漬けますか？</div>
        <div id="veg-categories"></div>
        <div id="selected-info"></div>
        <div class="panel-btns">
          <button class="btn-cancel" id="cancel-btn">キャンセル</button>
          <button class="btn-confirm" id="confirm-btn" disabled>漬け込む 🥒</button>
        </div>
      </div>
    </div>

    <!-- フィードバック画面 -->
    <div id="feedback-screen">
      <div class="fb-emoji" id="fb-emoji"></div>
      <div class="fb-title" id="fb-title"></div>
      <div class="fb-sub">フィードバックで次回の目安が精度アップします</div>
      <button class="fb-btn perfect" onclick="submitFeedback('perfect')">😋 ちょうどよかった！</button>
      <button class="fb-btn light" onclick="submitFeedback('light')">😅 浅かった…</button>
      <button class="fb-btn heavy" onclick="submitFeedback('heavy')">😬 漬かりすぎ…</button>
    </div>

    <!-- レコメンド画面 -->
    <div id="recommend-screen">
      <div class="section-label">AIレコメンド</div>
      <div class="rec-title">次に漬けるなら？💡</div>
      <div id="rec-list"></div>
      <button class="btn-back" onclick="showScreen('home')">ホームへ戻る</button>
    </div>

    <!-- 履歴画面 -->
    <div id="history-screen">
      <div class="section-label">漬け込み履歴</div>
      <div id="history-list"></div>
      <div id="history-empty">履歴がまだありません</div>
    </div>
  </div>

  <div id="toast"></div>

  <div id="bottom-nav">
    <button class="nav-btn active" onclick="showScreen('home')" id="nav-home">
      <div class="nav-badge" id="urgent-badge"></div>
      <div class="nav-emoji">🪣</div>
      <div class="nav-label">糠床</div>
      <div class="nav-active-bar"></div>
    </button>
    <button class="nav-btn" onclick="showScreen('recommend')" id="nav-recommend">
      <div class="nav-emoji">💡</div>
      <div class="nav-label">提案</div>
      <div class="nav-active-bar"></div>
    </button>
    <button class="nav-btn" onclick="showScreen('history')" id="nav-history">
      <div class="nav-emoji">📋</div>
      <div class="nav-label">履歴</div>
      <div class="nav-active-bar"></div>
    </button>
  </div>
</div>

<script>
// ============================================================
// 設定 — GASデプロイ後にURLを書き換える
// ============================================================
const GAS_URL = 'https://script.google.com/macros/library/d/1WJkWuTCVTQk40fJPrRqX97UFHGgnwbSXYLpeuSRQsbjXOGoO_umpSbjl/3';

// ============================================================
// 野菜マスタ
// ============================================================
const VEGETABLES = [
  { emoji:'🥒', name:'きゅうり',  hours:18, category:'定番' },
  { emoji:'🍆', name:'なす',      hours:36, category:'定番' },
  { emoji:'🥕', name:'にんじん',  hours:48, category:'定番' },
  { emoji:'🧅', name:'かぶ',      hours:24, category:'定番' },
  { emoji:'🥚', name:'ゆで卵',    hours:24, category:'定番' },
  { emoji:'🫚', name:'大根',      hours:48, category:'定番' },
  { emoji:'🍋', name:'みょうが',  hours:12, category:'季節' },
  { emoji:'🫑', name:'パプリカ',  hours:24, category:'季節' },
  { emoji:'🥬', name:'白菜',      hours:36, category:'季節' },
  { emoji:'🌽', name:'とうもろこし', hours:8, category:'季節' },
  { emoji:'🫛', name:'スナップえんどう', hours:8, category:'珍しい' },
  { emoji:'🍄', name:'しいたけ',  hours:12, category:'珍しい' },
  { emoji:'🍅', name:'ミニトマト', hours:6, category:'珍しい' },
  { emoji:'🧀', name:'クリームチーズ', hours:24, category:'変化球' },
  { emoji:'🥑', name:'アボカド',  hours:12, category:'変化球' },
  { emoji:'🧄', name:'にんにく',  hours:72, category:'変化球' },
];

const CATEGORIES = ['定番','季節','珍しい','変化球'];

const USERS = [
  { id:'koji',   name:'こうじ',  color:'#5B82C0', cls:'koji'   },
  { id:'hiromi', name:'ひろみ',  color:'#C17D6A', cls:'hiromi' },
];

// ============================================================
// 状態
// ============================================================
let currentUser = USERS[0];
let items = [];        // 漬け込み中
let history = [];      // 履歴
let selectedVeg = null;
let pendingRemove = null;
let currentScreen = 'home';

// ============================================================
// GAS API
// ============================================================
async function gasCall(params) {
  if (!GAS_URL || GAS_URL === 'YOUR_GAS_WEB_APP_URL_HERE') {
    return mockApi(params);
  }
  try {
    const url = new URL(GAS_URL);
    Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
    const res = await fetch(url.toString(), { method:'GET', mode:'cors' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await res.json();
  } catch(e) {
    showError('通信エラー: ' + e.message);
    return null;
  }
}

async function gasPost(action, body) {
  if (!GAS_URL || GAS_URL === 'YOUR_GAS_WEB_APP_URL_HERE') {
    return mockApi({ action, ...body });
  }
  // GASはCORSのPOSTプリフライトを通せないためGETで統一
  // bodyはクエリパラメータ"body"にJSON文字列で渡す
  try {
    const url = new URL(GAS_URL);
    url.searchParams.set('action', action);
    url.searchParams.set('body', JSON.stringify(body));
    const res = await fetch(url.toString(), { method:'GET', mode:'cors' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await res.json();
  } catch(e) {
    showError('通信エラー: ' + e.message);
    return null;
  }
}

// ============================================================
// モックデータ（GAS未設定時）
// ============================================================
let mockItems = [
  { id:'m1', vegEmoji:'🥒', vegName:'きゅうり', hours:18, adjustedHours:18,
    addedAt: new Date(Date.now()-14*3600000).toISOString(), userId:'koji', userName:'こうじ' },
  { id:'m2', vegEmoji:'🍆', vegName:'なす', hours:36, adjustedHours:36,
    addedAt: new Date(Date.now()-20*3600000).toISOString(), userId:'hiromi', userName:'ひろみ' },
  { id:'m3', vegEmoji:'🥚', vegName:'ゆで卵', hours:24, adjustedHours:24,
    addedAt: new Date(Date.now()-22*3600000).toISOString(), userId:'hiromi', userName:'ひろみ' },
];
let mockHistory = [
  { id:'h1', vegEmoji:'🥕', vegName:'にんじん', addedAt: new Date(Date.now()-4*86400000).toISOString(),
    removedAt: new Date(Date.now()-2*86400000).toISOString(), userId:'koji', userName:'こうじ', feedback:'perfect' },
  { id:'h2', vegEmoji:'🧅', vegName:'かぶ', addedAt: new Date(Date.now()-7*86400000).toISOString(),
    removedAt: new Date(Date.now()-5*86400000).toISOString(), userId:'hiromi', userName:'ひろみ', feedback:'light' },
];
let mockAiMsg = {
  text: 'こうじさんはきゅうりをよく漬けてますね。ひろみさんはゆで卵がお好きみたい。かぶもたまに漬けると糠床が喜びますよ🥬',
  date: new Date().toLocaleDateString('ja-JP')
};

function mockApi(params) {
  const action = params.action;
  if (action === 'getItems') return Promise.resolve({ ok:true, data: mockItems });
  if (action === 'getHistory') return Promise.resolve({ ok:true, data: mockHistory });
  if (action === 'getAiMessage') return Promise.resolve({ ok:true, data: mockAiMsg });
  if (action === 'addItem') {
    const item = {
      id: 'mock_' + Date.now(),
      vegEmoji: params.vegEmoji, vegName: params.vegName,
      hours: params.hours, adjustedHours: params.hours,
      addedAt: new Date().toISOString(),
      userId: params.userId, userName: params.userName
    };
    mockItems.push(item);
    return Promise.resolve({ ok:true, data: item });
  }
  if (action === 'removeItem') {
    const item = mockItems.find(i => i.id === params.id);
    if (item) {
      item.removedAt = new Date().toISOString();
      item.feedback = params.feedback || '';
      mockHistory.unshift(item);
      mockItems = mockItems.filter(i => i.id !== params.id);
    }
    return Promise.resolve({ ok:true });
  }
  return Promise.resolve({ ok:true });
}

// ============================================================
// データ読み込み
// ============================================================
async function loadAll() {
  const [itemsRes, histRes, aiRes] = await Promise.all([
    gasCall({ action:'getItems' }),
    gasCall({ action:'getHistory' }),
    gasCall({ action:'getAiMessage' }),
  ]);
  if (itemsRes?.ok) { items = itemsRes.data || []; }
  if (histRes?.ok)  { history = histRes.data || []; }
  if (aiRes?.ok && aiRes.data?.text) {
    document.getElementById('ai-card').style.display = 'block';
    document.getElementById('ai-text').textContent = aiRes.data.text;
    document.getElementById('ai-date').textContent = aiRes.data.date;
  }
  renderItems();
  renderHistory();
}

// ============================================================
// 時間フォーマット
// ============================================================
function formatRemaining(addedAtStr, adjustedHours) {
  const readyAt = new Date(new Date(addedAtStr).getTime() + adjustedHours * 3600000);
  const diff = readyAt - Date.now();
  if (diff <= 0) return { label:'取り出せます！', urgent:true };
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  if (h >= 24) return { label:`約${Math.ceil(h/24)}日後`, urgent:false };
  if (h > 0)   return { label:`${h}時間${m}分後`, urgent: h < 3 };
  return { label:`${m}分後`, urgent:true };
}

function relativeDate(isoStr) {
  const d = new Date(isoStr);
  const diff = Math.floor((Date.now() - d) / 86400000);
  if (diff === 0) return '今日';
  if (diff === 1) return '昨日';
  return `${diff}日前`;
}

const FB_EMOJI = { perfect:'😋', light:'😅', heavy:'😬', '':'—' };

// ============================================================
// レンダリング
// ============================================================
function renderItems() {
  const list = document.getElementById('items-list');
  const empty = document.getElementById('empty-state');
  const label = document.getElementById('items-label');
  list.innerHTML = '';

  if (items.length === 0) {
    empty.style.display = 'block';
    label.textContent = '糠床の中身';
    updateUrgentBadge(0);
    return;
  }
  empty.style.display = 'none';
  let urgentCount = 0;

  items.forEach(item => {
    const { label: timeLabel, urgent } = formatRemaining(item.addedAt, item.adjustedHours);
    if (urgent) urgentCount++;
    const userObj = USERS.find(u => u.id === item.userId) || USERS[0];

    const card = document.createElement('div');
    card.className = 'item-card' + (urgent ? ' urgent' : '');
    card.innerHTML = `
      <div class="veg-emoji">${item.vegEmoji}</div>
      <div class="item-info">
        <div class="item-name">${item.vegName}</div>
        <div class="item-meta">
          <span class="badge-time${urgent ? ' urgent' : ''}">${urgent ? '⚠ ' : ''}${timeLabel}</span>
          <span class="badge-user ${userObj.cls}">${userObj.name}</span>
        </div>
      </div>
      <button class="btn-remove${urgent ? ' urgent' : ''}" onclick="startRemove('${item.id}')">取り出す</button>
    `;
    list.appendChild(card);
  });

  label.textContent = `糠床の中身 · ${items.length}品`;
  updateUrgentBadge(urgentCount);
}

function renderHistory() {
  const list = document.getElementById('history-list');
  const empty = document.getElementById('history-empty');
  list.innerHTML = '';

  if (history.length === 0) {
    list.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  list.style.display = 'block';
  empty.style.display = 'none';

  history.slice(0, 20).forEach(item => {
    const userObj = USERS.find(u => u.id === item.userId) || USERS[0];
    const div = document.createElement('div');
    div.className = 'hist-item';
    div.innerHTML = `
      <div class="hist-emoji">${item.vegEmoji}</div>
      <div class="hist-info">
        <div class="hist-name">${item.vegName}</div>
        <div class="hist-meta">${relativeDate(item.addedAt)} · ${userObj.name}</div>
      </div>
      <div class="hist-fb">${FB_EMOJI[item.feedback] || '—'}</div>
    `;
    list.appendChild(div);
  });
}

function renderRecommend() {
  const month = new Date().getMonth() + 1;
  const seasonal = month >= 6 && month <= 9
    ? [{ emoji:'🍋', name:'みょうが', reason:'夏が旬、さっぱりした酸味が最高', tag:'season' }]
    : month >= 10 && month <= 12
    ? [{ emoji:'🥬', name:'白菜',  reason:'冬野菜の定番、深漬けがおいしい', tag:'season' }]
    : [{ emoji:'🫑', name:'パプリカ', reason:'春〜夏が旬、彩りもきれい', tag:'season' }];

  // 最近使った野菜を除外
  const recentNames = history.slice(0, 5).map(h => h.vegName);
  const candidates = [
    ...seasonal,
    { emoji:'🧀', name:'クリームチーズ', reason:'濃厚でお酒のつまみに最高', tag:'twist' },
    { emoji:'🥑', name:'アボカド', reason:'クリーミーに仕上がる変化球', tag:'twist' },
    { emoji:'🫛', name:'スナップえんどう', reason:'食感が楽しい、短時間でOK', tag:'unique' },
    { emoji:'🍅', name:'ミニトマト', reason:'意外と合う、6時間でOK', tag:'unique' },
    { emoji:'🧄', name:'にんにく', reason:'長漬けで深みが出る', tag:'unique' },
  ].filter(c => !recentNames.includes(c.name));

  const tagLabel = { season:'季節', twist:'変化球', unique:'珍しい' };
  const tagCls   = { season:'season', twist:'twist', unique:'unique' };

  const list = document.getElementById('rec-list');
  list.innerHTML = '';
  candidates.slice(0, 5).forEach(r => {
    const div = document.createElement('div');
    div.className = 'rec-card';
    div.innerHTML = `
      <div class="rc-emoji">${r.emoji}</div>
      <div class="rc-info">
        <div class="rc-name">${r.name}</div>
        <div class="rc-reason">${r.reason}</div>
      </div>
      <div class="rec-tag ${tagCls[r.tag]}">${tagLabel[r.tag]}</div>
    `;
    list.appendChild(div);
  });
}

// ============================================================
// 野菜グリッド生成
// ============================================================
function buildVegGrid() {
  const container = document.getElementById('veg-categories');
  container.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const vegs = VEGETABLES.filter(v => v.category === cat);
    const section = document.createElement('div');
    section.className = 'veg-category';
    section.innerHTML = `<div class="cat-label">${cat}</div>`;
    const grid = document.createElement('div');
    grid.className = 'veg-grid';
    vegs.forEach((v, _) => {
      const idx = VEGETABLES.indexOf(v);
      const btn = document.createElement('button');
      btn.className = 'veg-btn';
      btn.dataset.idx = idx;
      btn.innerHTML = `<span class="v-emoji">${v.emoji}</span><span class="v-name">${v.name}</span>`;
      btn.onclick = () => selectVeg(idx);
      grid.appendChild(btn);
    });
    section.appendChild(grid);
    container.appendChild(section);
  });
}

function selectVeg(idx) {
  selectedVeg = idx;
  document.querySelectorAll('.veg-btn').forEach(b => {
    b.classList.toggle('selected', parseInt(b.dataset.idx) === idx);
  });
  const v = VEGETABLES[idx];
  const info = document.getElementById('selected-info');
  const hoursLabel = v.hours >= 24 ? `約${v.hours/24}日` : `約${v.hours}時間`;
  info.textContent = `目安：${v.name} → ${hoursLabel}（冷蔵庫）`;
  info.style.display = 'block';
  document.getElementById('confirm-btn').disabled = false;
}

// ============================================================
// 漬け込み
// ============================================================
document.getElementById('add-btn').addEventListener('click', () => {
  document.getElementById('add-btn').style.display = 'none';
  document.getElementById('add-panel').style.display = 'block';
  buildVegGrid();
  selectedVeg = null;
  document.getElementById('selected-info').style.display = 'none';
  document.getElementById('confirm-btn').disabled = true;
});

document.getElementById('cancel-btn').addEventListener('click', closeAddPanel);
function closeAddPanel() {
  document.getElementById('add-btn').style.display = 'block';
  document.getElementById('add-panel').style.display = 'none';
  selectedVeg = null;
}

document.getElementById('confirm-btn').addEventListener('click', async () => {
  if (selectedVeg === null) return;
  const v = VEGETABLES[selectedVeg];
  const btn = document.getElementById('confirm-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spinner"></span>登録中…';

  const res = await gasPost('addItem', {
    vegEmoji: v.emoji, vegName: v.name,
    hours: v.hours, adjustedHours: v.hours,
    userId: currentUser.id, userName: currentUser.name
  });

  if (res?.ok) {
    items = res.data ? [...items.filter(i => i.id !== res.data.id), res.data]
                     : items; // モック時はgasPostが追加済み
    // モック用に再取得
    const fresh = await gasCall({ action:'getItems' });
    if (fresh?.ok) items = fresh.data || [];
    renderItems();
    closeAddPanel();
    showToast(`${v.emoji} ${v.name}を漬け込みました！`);
  }
  btn.disabled = false;
  btn.innerHTML = '漬け込む 🥒';
});

// ============================================================
// 取り出し → フィードバック
// ============================================================
function startRemove(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  pendingRemove = item;
  document.getElementById('fb-emoji').textContent = item.vegEmoji;
  document.getElementById('fb-title').textContent = `${item.vegName}、どうでしたか？`;
  showScreen('feedback');
}

async function submitFeedback(result) {
  if (!pendingRemove) return;
  const res = await gasPost('removeItem', { id: pendingRemove.id, feedback: result });
  if (res?.ok) {
    // ローカル更新
    pendingRemove.removedAt = new Date().toISOString();
    pendingRemove.feedback = result;
    history.unshift(pendingRemove);
    items = items.filter(i => i.id !== pendingRemove.id);
    pendingRemove = null;
    renderItems();
    renderHistory();
    renderRecommend();
    showScreen('recommend');
  }
}

// ============================================================
// 画面切替
// ============================================================
function showScreen(name) {
  currentScreen = name;
  ['home','feedback','recommend','history'].forEach(s => {
    document.getElementById(s + '-screen').style.display = s === name ? 'block' : 'none';
  });
  ['home','recommend','history'].forEach(s => {
    const btn = document.getElementById('nav-' + s);
    if (btn) btn.classList.toggle('active', s === name);
  });
  if (name === 'recommend') renderRecommend();
  if (name === 'history')   renderHistory();
  if (name === 'home') {
    document.getElementById('add-btn').style.display = 'block';
    document.getElementById('add-panel').style.display = 'none';
  }
  window.scrollTo(0, 0);
}

// ============================================================
// ユーザー切替
// ============================================================
document.getElementById('user-toggle').addEventListener('click', () => {
  const idx = USERS.findIndex(u => u.id === currentUser.id);
  currentUser = USERS[(idx + 1) % USERS.length];
  document.getElementById('user-name').textContent = currentUser.name;
  document.getElementById('user-dot').style.background = currentUser.color;
});

// ============================================================
// バッジ・トースト・エラー
// ============================================================
function updateUrgentBadge(n) {
  const badge = document.getElementById('urgent-badge');
  badge.textContent = n;
  badge.classList.toggle('show', n > 0);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function showError(msg) {
  const bar = document.getElementById('error-bar');
  bar.textContent = '⚠ ' + msg;
  bar.style.display = 'block';
  setTimeout(() => bar.style.display = 'none', 5000);
}

// ============================================================
// 定期更新（1分ごとに残り時間を再描画）
// ============================================================
setInterval(() => {
  if (currentScreen === 'home') renderItems();
}, 60000);

// ============================================================
// 起動
// ============================================================
showScreen('home');
loadAll();
</script>
